{% extends "myapp/base.html" %}

{% block title %}403 — Acceso bloqueado{% endblock %}

{% block content %}
<div class="container" style="display:flex;justify-content:center;align-items:center;min-height:60vh;">
  <div style="text-align:center;max-width:480px;">
    <div style="font-size:5rem;margin-bottom:1rem;">🛡️</div>
    <h1 style="color:#ff4444;font-family:'Courier New',monospace;font-size:2.5rem;margin-bottom:.5rem;">
      403
    </h1>
    <h2 style="color:var(--accent);font-family:'Courier New',monospace;margin-bottom:1.5rem;">
      Acceso Bloqueado — WAF
    </h2>
    <p style="color:#aaa;margin-bottom:.75rem;">
      Tu petición ha sido bloqueada por el firewall de aplicaciones web.
    </p>
    {% if reason %}
    <p style="color:#555;font-size:.85rem;font-family:'Courier New',monospace;
              background:#111;padding:.5rem 1rem;border-radius:4px;
              border-left:3px solid #ff4444;display:inline-block;">
      Motivo: {{ reason }}
    </p>
    {% endif %}
    <div style="margin-top:2rem;">
      <a href="/" style="color:var(--accent);text-decoration:none;font-size:.9rem;">
        ← Volver al inicio
      </a>
    </div>
  </div>
</div>
{% endblock %}
