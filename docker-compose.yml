# ============================================
# OSINTng - Plataforma OSINT | Docker Compose
# ============================================
# 5 servicios: Django, PostgreSQL, Redis, Celery Worker, Celery Beat

services:
  # === BASE DE DATOS ===
  db:
    image: postgres:16-alpine
    container_name: osint_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-plataforma_osint}
      POSTGRES_USER: ${DB_USER:-osintng}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-osintng_secret_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-osintng}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === CACHE / BROKER ===
  redis:
    image: redis:7-alpine
    container_name: osint_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === DJANGO APP ===
  web:
    build: .
    container_name: osint_web
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             gunicorn mysite.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    volumes:
      - .:/app
      - static_files:/app/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # === CELERY WORKER (tareas OSINT async) ===
  celery_worker:
    build: .
    container_name: osint_celery
    restart: unless-stopped
    command: celery -A mysite worker -l info --concurrency=2
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # === CELERY BEAT (tareas programadas) ===
  celery_beat:
    build: .
    container_name: osint_beat
    restart: unless-stopped
    command: celery -A mysite beat -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  static_files:
